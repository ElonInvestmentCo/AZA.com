[build]
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/website run build"

[deploy]
startCommand = "node start.mjs"
healthcheckPath = "/api/status"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
