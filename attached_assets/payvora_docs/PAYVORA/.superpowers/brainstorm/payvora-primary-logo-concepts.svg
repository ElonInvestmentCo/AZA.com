    <text x="24" y="372" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760" fill="#0B1B3A">Concept A: Vora Flow</text>
    <text x="24" y="410" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">A contained geometric P with a subtle</text>
    <text x="24" y="434" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">forward-flow cut. It reads as protected</text>
    <text x="24" y="458" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">movement: wallet, exchange, payments,</text>
    <text x="24" y="482" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">and speed in one simple form.</text>
    <rect x="24" y="520" width="145" height="32" rx="4" fill="#EAF0FF"/>
    <text x="40" y="542" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#2F6BFF">Recommended</text>
  </g>

