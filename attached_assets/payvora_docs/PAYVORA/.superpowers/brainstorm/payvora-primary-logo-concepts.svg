  <text x="70" y="82" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="760" fill="#0B1B3A">PAYVORA Primary Logo Concepts</text>
  <text x="70" y="118" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Symbol + wordmark only. Flat, geometric, SVG-ready, and shown on light and dark backgrounds.</text>

