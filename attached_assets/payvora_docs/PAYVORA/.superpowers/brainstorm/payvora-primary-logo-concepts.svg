    <text x="24" y="372" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760" fill="#0B1B3A">Concept C: Nexus V</text>
    <text x="24" y="410" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">A sharper P/V monogram built from</text>
    <text x="24" y="434" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">connected paths. It emphasizes speed,</text>
    <text x="24" y="458" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">exchange, and modernity, but has a more</text>
    <text x="24" y="482" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">aggressive tech-trading personality.</text>
  </g>

  <rect x="70" y="790" width="1260" height="78" rx="8" fill="#0B1B3A"/>
  <text x="96" y="824" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="760" fill="#FFFFFF">Recommendation</text>
  <text x="96" y="852" font-family="Inter, Arial, sans-serif" font-size="17" fill="#D9E8FF">Concept A is the strongest primary logo foundation: it balances trust, speed, simplicity, and fintech innovation while staying distinctive and SVG-clean.</text>
