    <text x="24" y="372" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760" fill="#0B1B3A">Concept B: Secure Rails</text>
    <text x="24" y="410" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">A shield-like hexagon with a routed rail</text>
    <text x="24" y="434" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">shape. It strongly communicates security,</text>
    <text x="24" y="458" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">infrastructure, and control, but feels more</text>
    <text x="24" y="482" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">institutional than effortless.</text>
  </g>

  <g transform="translate(940 165)">
