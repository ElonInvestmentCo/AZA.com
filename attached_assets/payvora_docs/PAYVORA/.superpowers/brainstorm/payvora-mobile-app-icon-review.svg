      .sub { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 430; fill: #475569; letter-spacing: 0; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 760; fill: #0B1B3A; letter-spacing: 0; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 430; fill: #475569; letter-spacing: 0; }
    </style>
    <symbol id="app-icon" viewBox="0 0 1024 1024">
      <rect width="1024" height="1024" rx="224" fill="#2F6BFF"/>
      <path d="M329.6 284.8H584C710.4 284.8 795.2 363.2 795.2 476.8C795.2 592 710.4 668.8 584 668.8H464V800H329.6V284.8ZM464 400V555.2H574.4C630.4 555.2 662.4 526.4 662.4 476.8C662.4 428.8 630.4 400 574.4 400H464Z" fill="#FFFFFF"/>
      <path d="M494.4 662.4H633.6L761.6 800H612.8L494.4 662.4Z" fill="#FFFFFF" opacity=".96"/>
    </symbol>
  </defs>

  <rect width="1400" height="920" fill="#F8FAFC"/>
  <text x="72" y="82" class="title">PAYVORA Mobile App Icon</text>
  <text x="72" y="118" class="sub">1024x1024 flat app icon based entirely on the approved logo symbol. No text, no new motif.</text>

  <g transform="translate(72 168)">
