    <use href="#app-icon" x="42" y="96" width="128" height="128"/>
    <use href="#app-icon" x="216" y="112" width="96" height="96"/>
    <use href="#app-icon" x="358" y="128" width="64" height="64"/>
    <use href="#app-icon" x="466" y="144" width="32" height="32"/>
    <text x="74" y="250" class="body">128</text>
    <text x="248" y="250" class="body">96</text>
    <text x="380" y="250" class="body">64</text>
    <text x="472" y="250" class="body">32</text>
